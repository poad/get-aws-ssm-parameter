name: E2E Test

on:
  push:
    branches: [ main ]
  pull_request:

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 'lts/*'
        check-latest: true
        package-manager-cache: false

    - name: Install pnpm
      uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      with:
        run_install: |
          - recursive: true
            args: [--no-frozen-lockfile]
          - args: [--global, aws-cdk]

    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
      with:
        role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
        role-session-name: GitHubActions
        aws-region: us-west-2
    - name: Create for testing table
      working-directory: __tests__/cdk
      run: cdk deploy --all

  test:
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us-west-2, ap-northeast-1]

    steps:
    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
      with:
        role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
        role-session-name: GitHubActions
        aws-region: ${{ matrix.region }}

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24.x
        check-latest: true
        package-manager-cache: false

    - name: Install pnpm
      uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      with:
        run_install: |
          - recursive: true
            args: [--no-frozen-lockfile]

    - name: Run E2E test
      id: test
      uses: ./
      with:
        parameter-name: /get-aws-ssm-parameter/test
        aws-region: ${{ matrix.region }}
        decryption: false

    - name: verify value
      run: if [ ${{ steps.test.outputs.value }} != 'test' ]; then exit 1; fi

    - name: Prepare E2E test with decryption
      id: prepare-test-with-decryption
      run: aws ssm put-parameter --name '/get-aws-ssm-parameter/test-with-decryption' --value 'test-with-decryption' --type String --overwrite --region ${{ matrix.region }}

    - name: Run E2E test with decryption
      id: test-with-decryption
      uses: ./
      with:
        parameter-name: /get-aws-ssm-parameter/test-with-decryption
        aws-region: ${{ matrix.region }}
        decryption: true

    - name: verify value with decryption
      run: if [ ${{ steps.test-with-decryption.outputs.value }} != 'test-with-decryption' ]; then exit 1; fi

    - name: Run E2E test with ignore-parameter-not-found (parameter exists)
      id: test-ignore-exists
      uses: ./
      with:
        parameter-name: /get-aws-ssm-parameter/test
        aws-region: ${{ matrix.region }}
        decryption: false
        ignore-parameter-not-found: true

    - name: verify value with ignore-parameter-not-found (exists)
      run: if [ ${{ steps.test-ignore-exists.outputs.value }} != 'test' ]; then exit 1; fi

    - name: Run E2E test with ignore-parameter-not-found (parameter not found)
      id: test-ignore-not-found
      uses: ./
      with:
        parameter-name: /get-aws-ssm-parameter/non-existent-param
        aws-region: ${{ matrix.region }}
        decryption: false
        ignore-parameter-not-found: true

    - name: verify value with ignore-parameter-not-found (not found)
      run: if [ ${{ steps.test-ignore-not-found.outputs.value }} != '' ]; then exit 1; fi

    - name: Run E2E test without ignore-parameter-not-found (parameter not found - should fail)
      id: test-no-ignore-not-found
      continue-on-error: true
      uses: ./
      with:
        parameter-name: /get-aws-ssm-parameter/non-existent-param
        aws-region: ${{ matrix.region }}
        decryption: false
        ignore-parameter-not-found: false

    - name: verify failure (without ignore-parameter-not-found)
      run: if [ ${{ steps.test-no-ignore-not-found.outcome }} != 'failure' ]; then exit 1; fi
