packages:
  - .
  - __tests__/cdk

allowBuilds:
  '@swc/core': false
  esbuild: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - tinyexec@1.2.4
  - pnpm@11.5.2

overrides:
  chokidar: '>=5'
  eslint-import-resolver-typescript: '^4.4.4'
  semver: '>=7'

trustPolicy: no-downgrade
